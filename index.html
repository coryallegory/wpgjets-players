<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Winnipeg Jets Players</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <h1>Winnipeg Jets Players</h1>
      <p class="subtitle">
        All players who appeared in at least one Winnipeg Jets game. Click a column heading to sort.
      </p>
      <p class="subtitle">
        Need to edit rookie card data locally? Open <a href="card-editor.html">card-editor.html</a>.
      </p>

      <section class="controls" aria-label="Table controls">
        <p class="controls__label">Column groups:</p>
        <button type="button" class="group-toggle" data-target-group="stats" aria-pressed="true">
          Hide playing stats
        </button>
        <button type="button" class="group-toggle" data-target-group="card" aria-pressed="true">
          Hide card info
        </button>

        <label class="controls__label" for="owned-filter">Owned filter:</label>
        <select id="owned-filter" class="filter-select">
          <option value="all">Show all</option>
          <option value="owned">Owned only</option>
          <option value="unowned">Unowned only</option>
        </select>
      </section>

      <div class="table-wrapper">
        <table id="players-table">
          <thead>
            <tr class="group-row">
              <th class="group-header group-player" colspan="1">Player Name</th>
              <th class="group-header group-stats" colspan="5">Playing Stats</th>
              <th class="group-header group-card" colspan="4">Card Info</th>
            </tr>
            <tr>
              <th class="col-player"><button type="button" data-key="playerName">Player</button></th>
              <th class="col-stats"><button type="button" data-key="position">Pos</button></th>
              <th class="col-stats"><button type="button" data-key="gamesPlayedRegularSeason">Reg GP</button></th>
              <th class="col-stats"><button type="button" data-key="gamesPlayedPlayoffs">Ply GP</button></th>
              <th class="col-stats"><button type="button" data-key="firstSeason">1st</button></th>
              <th class="col-stats"><button type="button" data-key="totalSeasons">Seasons</button></th>
              <th class="col-card"><button type="button" data-key="isYoungGuns">YG</button></th>
              <th class="col-card"><button type="button" data-key="rookieCardSet">Set</button></th>
              <th class="col-card"><button type="button" data-key="rookieCardNumber">#</button></th>
              <th class="col-card"><button type="button" data-key="rookieCardIsOwned">Owned</button></th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </main>

    <script type="module" src="js/main.js"></script>
  </body>
</html>
